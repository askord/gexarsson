<!DOCTYPE html>
<html>
<head>
    <title>Игра: {{ room.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Комната: {{ room.name }}</h2>
    <div id="game-container" style="display: flex;">
        <div id="game-board" style="position: relative; width: 800px; height: 600px; border: 1px solid black; background: #fafafa; overflow: hidden;">
            <div id="hex-grid" style="position: absolute; width: 100%; height: 100%;"></div>
        </div>
        <div id="game-ui" style="margin-left: 20px;">
            <div id="status-panel">
                <h3 id="current-state-text">Загрузка...</h3>
                <div id="next-tile-view" style="width: 100px; height: 100px; border: 1px solid #ccc;">
                    <img id="next-tile-img" style="width: 100%; height: 100%;" src="">
                </div>
                <button id="rotate-btn">Повернуть</button>
                <div id="meeple-selection" style="display:none;">
                    <h4>Поставить мипла?</h4>
                    <button onclick="sendPlaceMeeple(6)">Центр</button><br>
                    <button onclick="sendPlaceMeeple(0)">Восток</button>
                    <button onclick="sendPlaceMeeple(1)">Юго-восток</button>
                    <button onclick="sendPlaceMeeple(2)">Юго-запад</button>
                    <button onclick="sendPlaceMeeple(3)">Запад</button>
                    <button onclick="sendPlaceMeeple(4)">Северо-запад</button>
                    <button onclick="sendPlaceMeeple(5)">Северо-восток</button><br>
                    <button onclick="sendSkipMeeple()">Пропустить</button>
                </div>
            </div>
            <hr>
            <div id="scores-panel">
                <h3>Счет</h3>
                <div id="player-scores"></div>
            </div>
            <hr>
            <div id="turn-info"></div>
            <div id="message-log" style="height: 150px; overflow-y: scroll; border: 1px solid #eee; margin-top: 10px; width: 250px;"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script>
        var socket = io();
        var roomId = "{{ room.id }}";
        var board = {};
        var currentUserId = {{ current_user.id }};
        var gameState = null;

        socket.on('connect', function() {
            socket.emit('join', {room: roomId});
        });

        socket.on('game_update', function(data) {
            console.log('Update:', data);
            gameState = data;
            board = data.board;
            renderBoard();
            updateUI();
        });

        socket.on('message', function(data) {
            var log = document.getElementById('message-log');
            log.innerHTML += '<div>' + data.msg + '</div>';
            log.scrollTop = log.scrollHeight;
        });

        socket.on('error', function(data) {
            alert(data.msg);
        });

        function renderBoard() {
            var gridDiv = document.getElementById('hex-grid');
            gridDiv.innerHTML = '';
            for (var key in board) {
                var pos = key.split(',');
                var q = parseInt(pos[0]);
                var r = parseInt(pos[1]);
                var tile = board[key];

                var container = document.createElement('div');
                container.style.position = 'absolute';
                var x = 50 * (Math.sqrt(3) * (q + r/2)) + 400;
                var y = 50 * (1.5 * r) + 300;
                container.style.left = (x - 50) + 'px';
                container.style.top = (y - 50) + 'px';
                container.style.width = '100px';
                container.style.height = '100px';

                var tileImg = document.createElement('img');
                tileImg.src = '/static/tiles/' + tile.id + '.svg';
                tileImg.style.width = '100%';
                tileImg.style.height = '100%';
                if(tile.rotation) tileImg.style.transform = 'rotate(' + (tile.rotation * 60) + 'deg)';
                container.appendChild(tileImg);

                // Render meeples on this tile
                gameState.meeples.forEach(m => {
                    if (m.q == q && m.r == r) {
                        var meeple = document.createElement('div');
                        meeple.style.position = 'absolute';
                        meeple.style.width = '20px';
                        meeple.style.height = '20px';
                        meeple.style.background = 'black'; // Should be player color
                        meeple.style.borderRadius = '50%';
                        meeple.style.zIndex = '10';

                        // Positioning meeple on tile
                        var angle = (m.side == 6) ? 0 : (m.side * 60);
                        var dist = (m.side == 6) ? 0 : 35;
                        var mx = 40 + dist * Math.cos(angle * Math.PI / 180);
                        var my = 40 + dist * Math.sin(angle * Math.PI / 180);
                        meeple.style.left = mx + 'px';
                        meeple.style.top = my + 'px';
                        container.appendChild(meeple);
                    }
                });

                gridDiv.appendChild(container);
            }
        }

        function updateUI() {
            var turnInfo = document.getElementById('turn-info');
            var isMyTurn = gameState.players[gameState.current_player_index] === currentUserId;
            var stateText = document.getElementById('current-state-text');
            var rotateBtn = document.getElementById('rotate-btn');
            var meepleSelection = document.getElementById('meeple-selection');
            var nextTileImg = document.getElementById('next-tile-img');

            if (gameState.state === 'PLACING_TILE') {
                stateText.innerText = "Размещение плитки";
                meepleSelection.style.display = 'none';
                rotateBtn.disabled = !isMyTurn;
                if (gameState.current_tile) {
                    nextTileImg.src = '/static/tiles/' + gameState.current_tile.id + '.svg';
                    nextTileImg.style.display = 'block';
                    if(gameState.current_tile.rotation) nextTileImg.style.transform = 'rotate(' + (gameState.current_tile.rotation * 60) + 'deg)';
                    else nextTileImg.style.transform = 'none';
                } else {
                    nextTileImg.style.display = 'none';
                }
            } else {
                stateText.innerText = "Размещение мипла";
                nextTileImg.style.display = 'none';
                rotateBtn.disabled = true;
                meepleSelection.style.display = isMyTurn ? 'block' : 'none';
            }

            turnInfo.innerHTML = isMyTurn ? "<b>Ваш ход!</b>" : "Ожидание игрока " + (gameState.current_player_index + 1);

            // Render scores
            var scoresDiv = document.getElementById('player-scores');
            scoresDiv.innerHTML = '';
            for (var uid in gameState.scores) {
                scoresDiv.innerHTML += '<div>Игрок ' + uid + ': ' + gameState.scores[uid] + '</div>';
            }
        }

        document.getElementById('rotate-btn').onclick = function() {
            socket.emit('rotate_tile', {room: roomId});
        };

        document.getElementById('game-board').onclick = function(e) {
            if (gameState.state !== 'PLACING_TILE') return;
            var rect = this.getBoundingClientRect();
            var x = e.clientX - rect.left - 400;
            var y = e.clientY - rect.top - 300;
            var q = (Math.sqrt(3)/3 * x - 1/3 * y) / 50;
            var r = (2/3 * y) / 50;
            var nq = Math.round(q);
            var nr = Math.round(r);
            socket.emit('place_tile', {room: roomId, q: nq, r: nr});
        };

        function sendPlaceMeeple(side) {
            socket.emit('place_meeple', {room: roomId, side: side});
        }

        function sendSkipMeeple() {
            socket.emit('skip_meeple', {room: roomId});
        }
    </script>
</body>
</html>
