<!DOCTYPE html>
<html>
<head><title>Личный кабинет</title></head>
<body>
    <h2>Привет, {{ current_user.username }}!</h2>
    <a href="{{ url_for('logout') }}">Выйти</a>
    <hr>
    <h3>Создать комнату</h3>
    <form action="{{ url_for('create_room') }}" method="POST">
        Название комнаты: <input name="room_name"><br>
        <button type="submit">Создать</button>
    </form>
    <hr>
    <h3>Доступные комнаты</h3>
    <ul>
        {% for room in rooms %}
            <li><a href="{{ url_for('game', room_id=room.id) }}">{{ room.name }}</a></li>
        {% endfor %}
    </ul>
</body>
</html>
